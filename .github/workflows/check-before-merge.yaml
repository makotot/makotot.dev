name: Check PullRequest before Merge

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.15.0
      - run: pnpm install
      - name: Build
        run: npm run build
      - name: format
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run tsc
      - name: Test
        run: npm run test:unit
